            <linearGradient id="logoGold" x1="428" y1="0" x2="428" y2="547" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#B87820"/>
              <stop offset="50%" stop-color="#FFD070"/>
              <stop offset="100%" stop-color="#B87820"/>

            <linearGradient id="logoTeal" x1="428" y1="0" x2="428" y2="547" gradientUnits="userSpaceOnUse">

              </feSpecularLighting>
              <feComposite in="specular" in2="SourceAlpha" operator="in" result="specularClip"/>
              <feBlend in="SourceGraphic" in2="specularClip" mode="screen" result="lit"/>

              <feFlood flood-color="#000000" flood-opacity="0.55" result="shadowFill"/>
              <feComposite in="shadowFill" in2="shadowOff" operator="in" result="shadow"/>

                <feMergeNode in="shadow"/>
                <feMergeNode in="lit"/>
              </feMerge>

      <section class="transport">
        <div class="transport-title transport-select-wrap">
          <strong id="keyReadout">G</strong>
          <span class="transport-key-label">Key</span>
          <select id="sceneKeySelect" class="transport-overlay-select" aria-label="Tonalidad">
            <option value="C">C</option>
            <option value="Cm">Cm</option>
            <option value="Db">Db</option>
            <option value="Dbm">Dbm</option>
            <option value="D">D</option>
            <option value="Dm">Dm</option>
            <option value="Eb">Eb</option>
            <option value="Ebm">Ebm</option>
            <option value="E">E</option>
            <option value="Em">Em</option>
            <option value="F">F</option>
            <option value="Fm">Fm</option>
            <option value="Gb">Gb</option>
            <option value="Gbm">Gbm</option>
            <option value="G">G</option>
            <option value="Gm">Gm</option>
            <option value="Ab">Ab</option>
            <option value="Abm">Abm</option>
            <option value="A">A</option>
            <option value="Am">Am</option>
            <option value="Bb">Bb</option>
            <option value="Bbm">Bbm</option>
            <option value="B">B</option>
            <option value="Bm">Bm</option>
          </select>
        </div>
        <div class="transport-actions" aria-label="Transport controls">
          <button id="playToggle" class="transport-icon primary" type="button" aria-label="Play">▶</button>
          <button id="stopButton" class="transport-icon" type="button" aria-label="Stop">■</button>
          <button id="metronomeToggle" class="transport-icon" type="button" aria-label="Metronome">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
              <path d="M5 21 L19 21 L15 3 L9 3 Z"/>
              <line x1="12" y1="21" x2="18" y2="8"/>
              <circle cx="18" cy="8" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
          </button>
        </div>
        <div class="transport-readout" aria-live="polite">
          <div class="transport-readout-btn transport-select-wrap">
            <strong id="meterReadout">4/4</strong>
            <select id="sceneMeterSelect" class="transport-overlay-select" aria-label="Compás">
              <option value="4/4">4/4</option>
              <option value="3/4">3/4</option>
              <option value="2/4">2/4</option>
              <option value="5/4">5/4</option>
              <option value="4/8">4/8</option>
              <option value="6/8">6/8</option>
              <option value="7/8">7/8</option>
              <option value="9/8">9/8</option>
              <option value="12/8">12/8</option>
            </select>
          </div>
          <span>BPM <strong id="bpmReadout">72</strong></span>
          <span>Beat <strong id="beatReadout">1</strong></span>
          <span>Bar <strong id="barReadout">1</strong></span>
        </div>
      </section>

      <section class="controls">
        <div class="button-row">
          <button id="loopToggle" type="button">Loop Off</button>
          <button id="tapTempo" type="button">Tap</button>
        </div>
      </section>

      <section class="mixer">
        <button id="mixerToggle" class="section-toggle" type="button" aria-expanded="true">
          <span id="mixerToggleText">Mixer</span>
          <span id="mixerToggleIcon" class="chevron up" aria-hidden="true"></span>
        </button>
        <div id="mixerPanel" class="mixer-panel">
          <div class="mixer-channel" data-channel="pad">
            <label class="slider compact">
              <span>Pad <strong id="padVolumeReadout">70%</strong></span>
              <input id="padVolume" type="range" min="0" max="100" value="70" />
            </label>
            <button id="padMute" class="mute-button" type="button" aria-label="Mute Pad">M</button>
          </div>
          <div class="mixer-channel" data-channel="loop">
            <label class="slider compact">
              <span>Loop <strong id="loopVolumeReadout">90%</strong></span>
              <input id="loopVolume" type="range" min="0" max="100" value="90" />
            </label>
            <button id="loopMute" class="mute-button" type="button" aria-label="Mute Loop">M</button>
          </div>
          <div class="mixer-channel" data-channel="click">
            <label class="slider compact">
              <span>Click <strong id="clickVolumeReadout">65%</strong></span>
              <input id="clickVolume" type="range" min="0" max="100" value="65" />
            </label>
            <button id="clickMute" class="mute-button" type="button" aria-label="Mute Click">M</button>
          </div>
          <div class="mixer-channel" data-channel="drum">
            <label class="slider compact">
              <span>Drums <strong id="drumVolumeReadout">85%</strong></span>
              <input id="drumVolume" type="range" min="0" max="100" value="85" />
            </label>
            <button id="drumMute" class="mute-button" type="button" aria-label="Mute Drums">M</button>
          </div>
          <div class="mixer-channel" data-channel="arp">
            <label class="slider compact">
              <span>Arp <strong id="arpVolumeReadout">75%</strong></span>
              <input id="arpVolume" type="range" min="0" max="100" value="16" />
            </label>
            <button id="arpMute" class="mute-button" type="button" aria-label="Mute Arp">M</button>
          </div>
        </div>
      </section>

      <section class="pad-synth">
        <div class="section-toolbar">
          <div class="section-title-group">
            <button id="padSynthToggle" class="section-toggle" type="button" aria-expanded="true">
              <span>Pad Synth</span>
              <span id="padSynthToggleIcon" class="chevron up" aria-hidden="true"></span>
            </button>
          </div>
          <label class="kit-control">
            <span>Mood</span>
            <select id="padMoodSelect">
              <option value="prayer">Prayer</option>
              <option value="heaven">Heaven</option>
              <option value="emotional">Emotional</option>
              <option value="epic">Epic</option>
              <option value="intimate">Intimate</option>
              <option value="transition">Transition</option>
              <option value="dark">Dark Ambient</option>
              <option value="cinematic">Cinematic</option>
            </select>
          </label>
        </div>
        <div id="padSynthPanel" class="pad-synth-panel">
          <label class="slider compact">
            <span>Movement <strong id="padMovementReadout">25%</strong></span>
            <input id="padMovement" type="range" min="0" max="100" value="25" />
          </label>
          <label class="slider compact">
            <span>Shimmer <strong id="padShimmerReadout">45%</strong></span>
            <input id="padShimmer" type="range" min="0" max="100" value="45" />
          </label>
          <label class="slider compact">
            <span>Warmth <strong id="padWarmthReadout">60%</strong></span>
            <input id="padWarmth" type="range" min="0" max="100" value="60" />
          </label>
          <label class="slider compact">
            <span>Space <strong id="padSpaceReadout">50%</strong></span>
            <input id="padSpace" type="range" min="0" max="100" value="50" />
          </label>
          <label class="slider compact">
            <span>Texture <strong id="padTextureReadout">20%</strong></span>
            <input id="padTexture" type="range" min="0" max="100" value="20" />
          </label>
          <button id="padEvolveToggle" class="utility-button" type="button">Evolve</button>
          <button id="padEqToggle" class="utility-button" type="button">EQ</button>
          <div id="padEqPanel" class="pad-eq-panel collapsed">
            <div id="padEqKnobs" class="pad-eq-grid"></div>
          </div>
        </div>
      </section>

      <section class="arp">
        <div class="section-toolbar">
          <div class="section-title-group">
            <button id="arpOnOff" class="power-button" type="button" aria-label="Toggle Arp"></button>
            <button id="arpToggle" class="section-toggle" type="button" aria-expanded="true">
              <span>Arp</span>
              <span id="arpToggleIcon" class="chevron up" aria-hidden="true"></span>
            </button>
          </div>
        </div>
        <div id="arpPanel" class="arp-panel">
          <div class="arp-controls">
            <label class="kit-control">
              <span>Mode</span>
              <select id="arpModeSelect">
                <option value="up">Up</option>
                <option value="down">Down</option>
                <option value="updown">Up/Down</option>
                <option value="converge">Converge</option>
                <option value="diverge">Diverge</option>
                <option value="random">Random</option>
                <option value="pedal">Pedal</option>
              </select>
            </label>
            <label class="kit-control">
              <span>Rate</span>
              <select id="arpRateSelect">
                <option value="1/4">1/4</option>
                <option value="1/4D">1/4D</option>
                <option value="1/4T">1/4T</option>
                <option value="1/8" selected>1/8</option>
                <option value="1/8D">1/8D</option>
                <option value="1/8T">1/8T</option>
                <option value="1/16">1/16</option>
                <option value="1/16D">1/16D</option>
                <option value="1/16T">1/16T</option>
              </select>
            </label>
            <label class="kit-control">
              <span>Octaves</span>
              <select id="arpOctavesSelect">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
              </select>
            </label>
            <label class="kit-control">
              <span>Voice</span>
              <select id="arpVoiceSelect">
                <option value="analog">Analog</option>
                <option value="bass">Bass</option>
                <option value="bell">Bell</option>
                <option value="fm">FM</option>
                <option value="gated">Gated</option>
                <option value="glass">Glass</option>
                <option value="mallet">Mallet</option>
                <option value="pad">Pad</option>
                <option value="pluck" selected>Pluck</option>
                <option value="reverse">Reverse</option>
                <option value="string">String</option>
                <option value="texture">Texture</option>
                <!-- hidden voices — development preserved -->
                <!-- <option value="keys">E.Piano</option> -->
                <!-- <option value="felt">Music Box</option> -->
              </select>
            </label>
            <button id="arpNaturalAccent" class="utility-button active" type="button">Natural</button>
          </div>
          <div class="arp-piano-wrap">
            <div class="arp-piano-header">
              <span class="arp-piano-label">Notes</span>
              <span class="arp-piano-root-hint"><strong id="arpPianoRootName">C Maj</strong></span>
              <span class="arp-piano-scroll-hint">swipe →</span>
              <div class="arp-piano-controls">
                <button id="arpOctMinus" class="arp-oct-btn" type="button">-Oct</button>
                <button id="arpOctPlus"  class="arp-oct-btn" type="button">+Oct</button>
                <button id="arpPianoClear" class="arp-piano-clear" type="button">Scale</button>
              </div>
            </div>
            <div id="arpPiano" class="arp-piano">
              <div class="arp-piano-oct">
                <button class="arp-pk white" data-note="0" type="button">C</button>
                <button class="arp-pk white" data-note="2" type="button">D</button>
                <button class="arp-pk white" data-note="4" type="button">E</button>
                <button class="arp-pk white" data-note="5" type="button">F</button>
                <button class="arp-pk white" data-note="7" type="button">G</button>
                <button class="arp-pk white" data-note="9" type="button">A</button>
                <button class="arp-pk white" data-note="11" type="button">B</button>
                <button class="arp-pk black" data-note="1" style="left:calc(100%/7*1 - 4.25%)" type="button">C#</button>
                <button class="arp-pk black" data-note="3" style="left:calc(100%/7*2 - 4.25%)" type="button">D#</button>
                <button class="arp-pk black" data-note="6" style="left:calc(100%/7*4 - 4.25%)" type="button">F#</button>
                <button class="arp-pk black" data-note="8" style="left:calc(100%/7*5 - 4.25%)" type="button">G#</button>
                <button class="arp-pk black" data-note="10" style="left:calc(100%/7*6 - 4.25%)" type="button">A#</button>
              </div>
              <div class="arp-piano-oct">
                <button class="arp-pk white" data-note="12" type="button">C<sup>2</sup></button>
                <button class="arp-pk white" data-note="14" type="button">D</button>
                <button class="arp-pk white" data-note="16" type="button">E</button>
                <button class="arp-pk white" data-note="17" type="button">F</button>
                <button class="arp-pk white" data-note="19" type="button">G</button>
                <button class="arp-pk white" data-note="21" type="button">A</button>
                <button class="arp-pk white" data-note="23" type="button">B</button>
                <button class="arp-pk black" data-note="13" style="left:calc(100%/7*1 - 4.25%)" type="button">C#</button>
                <button class="arp-pk black" data-note="15" style="left:calc(100%/7*2 - 4.25%)" type="button">D#</button>
                <button class="arp-pk black" data-note="18" style="left:calc(100%/7*4 - 4.25%)" type="button">F#</button>
                <button class="arp-pk black" data-note="20" style="left:calc(100%/7*5 - 4.25%)" type="button">G#</button>
                <button class="arp-pk black" data-note="22" style="left:calc(100%/7*6 - 4.25%)" type="button">A#</button>
              </div>
            </div>
          </div>
          <label class="slider compact">
            <span>Gate <strong id="arpGateReadout">60%</strong></span>
            <input id="arpGate" type="range" min="5" max="100" value="60" />
          </label>
          <label class="slider compact">
            <span>Swing <strong id="arpSwingReadout">0%</strong></span>
            <input id="arpSwing" type="range" min="0" max="50" value="0" />
          </label>
          <label class="slider compact">
            <span>Humanize <strong id="arpHumanizeReadout">0%</strong></span>
            <input id="arpHumanize" type="range" min="0" max="100" value="0" />
          </label>
          <label class="slider compact">
            <span>Glitch <strong id="arpGlitchReadout">0%</strong></span>
            <input id="arpGlitch" type="range" min="0" max="100" value="0" />
          </label>
          <div class="arp-fx-header">
            <button id="arpFxToggle" class="arp-fx-toggle" type="button">
              FX <span id="arpFxToggleIcon" class="chevron down"></span>
            </button>
            <button id="arpFxBypass" class="arp-fx-bypass" type="button">Bypass</button>
          </div>
          <div id="arpFxPanel" class="arp-fx-panel collapsed">
            <div class="arp-output-gain-row">
              <span class="arp-output-gain-label">Output Gain</span>
              <input type="range" id="arpOutputGainSlider" min="-24" max="6" step="1" value="0">
              <span id="arpOutputGainReadout">0 dB</span>
            </div>
            <!-- Row 1: Low Cut · Hi Cut · Sat · Chorus -->
            <div class="arp-knob-row" id="knobRow1"></div>
            <!-- Row 2: Dly Time · Dly Wet · Dly Feed · Reverb -->
            <div class="arp-knob-row" id="knobRow2">
              <div class="knob-select-unit">
                <div class="knob-select-box"><select id="arpDelayTimeSelect">
                  <option value="1/4">1/4</option>
                  <option value="1/4D">1/4D</option>
                  <option value="1/4T">1/4T</option>
                  <option value="1/8">1/8</option>
                  <option value="1/8D" selected>1/8D</option>
                  <option value="1/8T">1/8T</option>
                  <option value="1/16">1/16</option>
                  <option value="1/16D">1/16D</option>
                  <option value="1/16T">1/16T</option>
                </select></div>
                <span class="knob-label">Dly Time</span>
              </div>
            </div>
            <!-- Row 3: LFO toggle -->
            <div class="arp-lfo-row">
              <button id="arpLfoOnOff" type="button" class="arp-lfo-toggle">LFO</button>
            </div>
            <!-- Row 4: Shape · Type · Rate · Depth (all JS-created) -->
            <div class="arp-knob-row" id="knobRow3"></div>
          </div>
        </div>
      </section>

      <section class="drum-editor">
        <div class="section-toolbar">
          <div class="section-title-group">
            <button id="drumsToggle" class="power-button" type="button" aria-label="Toggle drums"></button>
            <button id="drumEditorToggle" class="section-toggle" type="button" aria-expanded="true">
              <span>Drum Editor</span>
              <span id="drumEditorToggleIcon" class="chevron up" aria-hidden="true"></span>
            </button>
          </div>
          <div class="drum-toolbar-controls">
            <label class="kit-control">
              <span>Groove</span>
              <select id="drumGrooveSelect">
                <option value="auto">Auto</option>
                <option value="rock">Rock</option>
                <option value="pop">Pop</option>
                <option value="blues">Blues</option>
                <option value="waltz">Waltz</option>
                <option value="bossa">Bossa</option>
              </select>
            </label>
            <label class="kit-control">
              <span>Kit</span>
              <select id="drumKitSelect">
                <option value="soft">Soft</option>
                <option value="tight">Tight</option>
                <option value="big">Big</option>
              </select>
            </label>
            <label class="kit-control">
              <span>Rate</span>
              <select id="drumRateSelect">
                <option value="half">Half</option>
                <option value="normal">1x</option>
                <option value="double">x2</option>
                <option value="quad">x4</option>
              </select>
            </label>
            <button id="drumSubdivisionToggle" class="utility-button active" type="button">1/16</button>
            <button id="accentModeToggle" class="utility-button" type="button">Accent</button>
            <button id="resetPattern" class="utility-button" type="button">Reset</button>
          </div>
        </div>
        <div id="drumEditorPanel" class="drum-editor-panel">
          <div class="step-header" id="stepHeader"></div>
          <div class="drum-row" data-instrument="kick">
            <button class="instrument-label instrument-menu-trigger" data-instrument-menu="kick" type="button" title="Kick" aria-label="Kick sound">K</button>
            <div class="step-grid" id="kickSteps"></div>
          </div>
          <div class="drum-row" data-instrument="snare">
            <button class="instrument-label instrument-menu-trigger" data-instrument-menu="snare" type="button" title="Snare" aria-label="Snare sound">S</button>
            <div class="step-grid" id="snareSteps"></div>
          </div>
          <div class="drum-row" data-instrument="hat">
            <button class="instrument-label instrument-menu-trigger" data-instrument-menu="hat" type="button" title="Hi-hat" aria-label="Hi-hat sound">H</button>
            <div class="step-grid" id="hatSteps"></div>
          </div>
          <div id="instrumentMenu" class="instrument-menu hidden">
            <strong id="instrumentMenuTitle">Kick</strong>
            <select id="instrumentMenuSelect"></select>
            <button id="instrumentMenuLoad" class="sample-load" type="button">Load</button>
            <button id="instrumentMenuBase" class="sample-load" type="button">Base</button>
          </div>
          <input id="kickSampleInput" class="sample-input" type="file" accept="audio/mpeg,audio/wav,audio/wave,audio/x-wav" />
          <input id="snareSampleInput" class="sample-input" type="file" accept="audio/mpeg,audio/wav,audio/wave,audio/x-wav" />
          <input id="hatSampleInput" class="sample-input" type="file" accept="audio/mpeg,audio/wav,audio/wave,audio/x-wav" />
        </div>
      </section>

      <section class="scenes">
        <h2>Escenas</h2>
        <div class="scene-tools">
          <fieldset class="name-field">
            <input id="sceneNameInput" type="text" maxlength="32" placeholder="Nombre" />
          </fieldset>
          <button id="applySceneSettings" class="save-button" type="button">Guardar</button>
          <button id="renameScene" type="button">Renombrar</button>
          <button id="newScene" type="button">Nueva</button>
          <button id="duplicateScene" type="button">Duplicar</button>
          <button id="deleteScene" class="danger-button" type="button">Borrar</button>
        </div>
        <div id="sceneGrid" class="scene-grid">
        </div>
      </section>

      <section class="status">
        <div id="pulse" class="pulse"></div>
        <p id="statusText">Toca Play para iniciar el audio.</p>
      </section>
    </main>

    <div id="bpmModal" class="bpm-modal" hidden>
      <div class="bpm-modal-box">
        <button id="bpmModalClose" class="bpm-modal-close" type="button" aria-label="Cerrar">✕</button>
        <div class="bpm-modal-label">Tempo</div>
        <div class="bpm-modal-row">
          <button id="bpmMinus5" class="bpm-step-btn" type="button">−5</button>
          <input id="bpmModalInput" class="bpm-modal-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="3" />
          <button id="bpmPlus5" class="bpm-step-btn" type="button">+5</button>
        </div>
        <button id="bpmModalTap" class="bpm-tap-btn" type="button">Tap Tempo</button>
        <label class="bpm-modal-slider">
          <input id="bpmSlider" type="range" min="48" max="156" value="72" />
          <span id="bpmSliderReadout">72 BPM</span>
        </label>
        <div class="bpm-modal-label" style="margin-top:8px">Click escucha</div>
        <div class="bpm-modal-row">
          <button id="clickModePulse" class="bpm-step-btn" type="button">Pulso</button>
          <button id="clickModeSubdivision" class="bpm-step-btn" type="button">Subdivisión</button>
        </div>
        <button id="bpmModalOk" class="bpm-ok-btn" type="button">OK</button>
      </div>
    </div>

    <script type="module" src="./app.js?v=118"></script>
  </body>
</html>
